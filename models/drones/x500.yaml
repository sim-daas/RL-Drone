motor_params:
  total_thrust: 36.0 # Max total thrust in Newtons (~9N per motor. TWR of ~2.4 for a 1.5kg drone)
  thrust_coef: 8.54e-06 # Typical 10-inch prop coefficient
  torque_coef: 8.06e-07 # Typical 10-inch prop torque coefficient
  noise_ratio: 0.03 # Increased slightly to mimic outdoor wind/motor variations
  tau: 0.03 # Motor time constant (larger motors spin up slower than the cf2x)

drag_params:
  drag_coef_xyz: 1.5 # Adjusted for 500mm frame
  drag_area_xyz: 0.02 # Rough cross-sectional area of X500
  drag_coef_pqr: 0.05 # Rotational drag

# You MUST include these headers so PyFlyt's parser doesn't crash, 
# but the values do not matter for Mode 0. Leave them as defaults.
control_params:
  ang_vel:
    kp: [4.0e-2, 4.0e-2, 8.0e-2]
    ki: [5.0e-7, 5.0e-7, 2.7e-4]
    kd: [1.0e-4, 1.0e-4, 0.0]
    lim: [1.0, 1.0, 1.0]
  ang_pos:
    kp: [2.0, 2.0, 2.0]
    ki: [0.0, 0.0, 0.0]
    kd: [0.0, 0.0, 0.0]
    lim: [3.0, 3.0, 3.0]
  lin_vel:
    kp: [0.8, 0.8]
    ki: [0.3, 0.3]
    kd: [0.5, 0.5]
    lim: [0.4, 0.4]
  lin_pos:
    kp: [1.0, 1.0]
    ki: [0.0, 0.0]
    kd: [0.0, 0.0]
    lim: [2.0, 2.0]
  z_pos:
    kp: 1.0
    ki: 0.0
    kd: 0.0
    lim: 1.0
  z_vel:
    kp: 2.0
    ki: 0.5
    kd: 0.05
    lim: 1.0